<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - GoFly</title>
  <link rel="shortcut icon" href="Logo.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary-color: #2c6e91; /* Lighter, professional blue (from previous option) */
      --secondary-color: #4280b2; /* Complementary blue */
      --accent-color: #ff6347;
      --background-light: #f4f7f9;
      --background-dark: #e9ecef;
      --text-dark: #333;
      --text-light: #f8f9fa;
      --card-bg: #ffffff;
      --border-radius-lg: 15px;
      --box-shadow-lg: 0 10px 20px rgba(0,0,0,0.1);
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: var(--background-light);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background-color: var(--primary-color);
      color: var(--text-light);
      padding: 1rem 2rem;
      font-size: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--box-shadow-lg);
    }
    .logout-btn {
      background-color: var(--accent-color);
      border: none;
      padding: 0.5rem 1.5rem;
      color: var(--text-light);
      border-radius: var(--border-radius-lg);
      cursor: pointer;
      font-weight: 500;
      transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease; /* Added transform and box-shadow */
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logout-btn:hover {
      background-color: #e65c40;
      transform: scale(1.05); /* Slight pulse effect */
      box-shadow: 0 0 15px rgba(255, 99, 71, 0.7); /* Glow effect */
    }
    .container {
      display: flex;
      flex: 1;
    }
    aside {
      background-color: var(--primary-color);
      padding: 2rem 1rem;
      min-width: 250px;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
    }
    aside button {
      background: transparent;
      border: none;
      border-radius: var(--border-radius-lg);
      padding: 1rem 1.25rem;
      font-size: 1rem;
      text-align: left;
      cursor: pointer;
      transition: background-color 0.3s ease, transform 0.2s ease;
      font-weight: 500;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    aside button:hover {
      background: var(--secondary-color);
      transform: translateX(8px); /* More noticeable slide-in */
    }
    aside button.active {
      background: var(--secondary-color);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      transform: translateX(5px); /* Keep it slightly indented when active */
    }
    main {
      flex: 1;
      padding: 2rem;
      background: var(--background-dark);
      border-left: 1px solid #ddd;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--border-radius-lg);
      padding: 2rem;
      box-shadow: var(--box-shadow-lg);
      max-width: 100%;
      height: 100%;
      margin: auto;
      display: none;
      /* Animation for card display */
      animation: fadeInSlide 0.5s ease-out forwards;
    }
    .card.active {
      display: block;
    }
    /* Keyframes for card animation */
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h2 {
      margin-bottom: 1.5rem;
      color: var(--primary-color);
      font-weight: 700;
      font-size: 1.8rem;
    }
  </style>
</head>
<body>
  <header>
    <span><i class="fas fa-plane-departure"></i> Admin Dashboard - GoFly</span>
    <button class="logout-btn" onclick="window.location.href='frontpage.html';">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </header>
  <div class="container">
    <aside>
      <button id="btn-flights" onclick="showSection('flights', this)">
        <i class="fas fa-plane"></i> Manage Flights
      </button>
      <button id="btn-airlines" onclick="showSection('airlines', this)">
        <i class="fas fa-building"></i> Manage Airlines
      </button>
      <button id="btn-bookings" onclick="showSection('bookings', this)">
        <i class="fas fa-book-open"></i> Manage Bookings
      </button>
      <button id="btn-users" onclick="showSection('users', this)">
        <i class="fas fa-users"></i> Manage Users
      </button>
      <button id="btn-locations" onclick="showSection('locations', this)">
        <i class="fas fa-map-marker-alt"></i> Manage Locations
      </button>
      <button id="btn-reports" onclick="showSection('reports', this)">
        <i class="fas fa-chart-line"></i> Generate Reports
      </button>
      <button id="btn-inquiries" onclick="showSection('inquiries', this)">
        <i class="fas fa-envelope"></i> Respond to Inquiries
      </button>
      <button id="btn-discounts" onclick="showSection('discounts', this)">
        <i class="fas fa-tags"></i> Manage Promotions
      </button>
      <button id="btn-dashboard" onclick="showSection('dashboard', this)">
        <i class="fas fa-tachometer-alt"></i> Dashboard Metrics
      </button>
    </aside>
    <main>
      <div id="flights" class="card">
        <iframe src="manage_flights.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="airlines" class="card">
        <iframe src="manage_airlines.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="bookings" class="card">
        <iframe src="manage_booking.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="users" class="card">
        <iframe src="manage_users.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="locations" class="card">
        <iframe src="manage_location.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="reports" class="card">
        <iframe src="generate_reports.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="inquiries" class="card">
        <iframe src="inquires.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="discounts" class="card">
        <iframe src="manage_promotion.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
      <div id="dashboard" class="card">
        <iframe src="dashboard.php" style="width:100%; height:1000px; border:none;"></iframe>
      </div>
    </main>
  </div>
  <script>
    function showSection(id, element) {
      // Deactivate all cards and buttons first
      document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
      document.querySelectorAll('aside button').forEach(btn => btn.classList.remove('active'));

      // Activate the selected card and button
      const activeCard = document.getElementById(id);
      activeCard.classList.add('active');
      if (element) {
        element.classList.add('active');
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      // Ensure the first section is active and animated on load
      showSection('flights', document.getElementById('btn-flights'));
    });
  </script>
</body>
</html>
