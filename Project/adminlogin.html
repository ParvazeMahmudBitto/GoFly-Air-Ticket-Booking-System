<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(270deg, #00b4d8, #0077b6, #90e0ef, #0096c7);
      background-size: 800% 800%;
      font-family: 'Poppins', sans-serif;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-box {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 400px;
      color: #fff;
      animation: slideFade 0.9s ease forwards;
      opacity: 0;
      transform: translateY(-40px);
    }

    @keyframes slideFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-box h3 {
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }

    .form-group {
      position: relative;
      margin-bottom: 1.8rem;
    }

    .form-control {
      border-radius: 12px;
      padding: 1rem;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 1rem;
      box-shadow: 0 3px 6px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 12px #00e5ff, 0 0 20px #0096c7;
    }

    /* Floating labels */
    .form-group label {
      position: absolute;
      top: 50%;
      left: 15px;
      transform: translateY(-50%);
      color: #ddd;
      font-size: 1rem;
      transition: 0.3s;
      pointer-events: none;
    }

    .form-control:focus + label,
    .form-control:not(:placeholder-shown) + label {
      top: -8px;
      left: 10px;
      font-size: 0.8rem;
      color: #00e5ff;
    }

    .btn-login {
      background: linear-gradient(135deg, #00e5ff, #0077b6);
      border: none;
      border-radius: 12px;
      font-weight: 600;
      padding: 0.8rem;
      width: 100%;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 15px rgba(0, 229, 255, 0.4);
    }

    /* Ripple effect */
    .btn-login::after {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      top: 50%;
      left: 50%;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s ease, height 0.6s ease;
    }

    .btn-login:active::after {
      width: 300px;
      height: 300px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="mx-auto mt-5 p-4 border rounded" style="max-width: 400px;">
      <h3 class="text-center">Admin Login</h3>
      <form action="adminloginprocess.php" method="POST">
        <div class="mb-3">
          <label>Email</label>
          <input type="text" name="username" class="form-control" required>
        </div>
        <div class="mb-3">
          <label>Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
    </div>
  </div>
</body>
</html>
